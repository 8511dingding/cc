server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 302 /FastMOSS-Report/;
    }

    location = /FastMOSS-Report {
        return 301 /FastMOSS-Report/;
    }

    location /FastMOSS-Report/ {
        index index.html;
        try_files $uri $uri/ /FastMOSS-Report/index.html;
    }
}
