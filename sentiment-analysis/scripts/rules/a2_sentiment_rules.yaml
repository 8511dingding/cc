# A2舆情分析规则配置 v1.0
# 情绪层、认知层、行动层关键词定义
# 规则更新只需编辑此文件，不需要改代码

version: "1.0"
date: "2026-05-29"

# ========== 情绪层配置（5分类）==========
emotion:
  # 优先级顺序：愤怒背叛 > 恐慌焦虑 > 正面 > 庆幸旁观 > 中性
  priority_order:
    - anger      # 愤怒背叛
    - panic      # 恐慌焦虑
    - positive   # 正面
    - relief     # 庆幸旁观
    - neutral    # 中性（默认）

  anger:
    label: "愤怒背叛"
    keywords:
      - "该死"
      - "欺骗"
      - "忽悠"
      - "被骗"
      - "上当"
      - "造假"
      - "破产"
      - "恶意"
      - "黑心"
      - "无良"
      - "骗子"
      - "垃圾品牌"
      - "气愤"
      - "失望透顶"
      - "谁还敢喝"
      - "骗人是狗"
      - "转黑"
      - "极其厌恶"
      - "三鹿"
      - "代加工"
      - "代工"
      - "贴牌"
      - "塌房"
      - "步步惊心"
      - "进口信不过"
      - "膈应"
      - "不要心存幻想"
      - "品牌失望"
      - "背刺"
      - "资本家"
      - "没人性"
      - "双标"
      - "不负责任"
      - "建议严查"
      - "企业无良"
      - "败絮其中"

  panic:
    label: "恐慌焦虑"
    keywords:
      - "会不会有事"
      - "有影响吗"
      - "有危害吗"
      - "怎么办"
      - "瑟瑟发抖"
      - "慌"
      - "害怕"
      - "担心"
      - "担忧"
      - "焦虑"
      - "着急"
      - "天哪"
      - "急死人"
      - "揪心"
      - "好担心"
      - "还能喝不"
      - "要不要换"
      - "有没有问题"
      - "能不能喝"
      - "咋办"
      - "咋整"
      - "选什么奶粉"
      - "选麻了"
      - "天塌了"
      - "不知道买什么奶粉"
      - "不知道换啥"
      - "求推荐"
      - "马上要生产了"
      - "是不是我娃"
      - "我娃吃了"
      - "宝宝吃了"
      - "这要换啥"
      - "这下咋整"
    special_mentions:
      - "@豆包"
    emojis:
      - "[流泪]"
      - "[大哭]"
      - "[绝望]"
      - "[捂脸]"
      - "[发呆]"
    symptom_keywords:
      - "吐奶"
      - "拉肚子"
      - "腹泻"
      - "便血"
      - "呕吐"
      - "绿便"
      - "奶瓣"
      - "不舒服"
      - "腹胀"
      - "哭闹"
      - "发烧"
      - "过敏"

  positive:
    label: "正面"
    keywords:
      - "放心"
      - "没有问题"
      - "可以继续喝"
      - "官方确认安全"
      - "没影响"
      - "未受影响"
      - "没事"
      - "娃从出生就喝"
      - "一直喝"
      - "这款奶粉"
      - "爱喝"
      - "嘎嘎爱喝"
      - "不会换"
      - "各方面都挺好"
      - "长势稳稳当当"
      - "身高"
      - "长高"
      - "长肉"
      - "体重"
      - "涨了"
      - "健康"
      - "壮"
      - "好得很"
      - "囤奶"
      - "正常喝"

  relief:
    label: "庆幸旁观"
    keywords:
      - "还好没买"
      - "幸好没买"
      - "多亏没买"
      - "还好不是"
      - "还好"
      - "好在"
      - "好险"
      - "国产更好"
      - "喝母乳"
      - "不喝外国奶"
      - "幸好没选"
      - "两个娃都喝"
      - "不喝外国货"
      - "感谢自己拖拉"
      - "幸亏没换"
      - "幸亏没"
      - "暗自观察"
      - "又出事啦"
      - "希望守住"
      - "早就换了"
      - "暗自庆幸"
      - "我机智"
      - "我选对了"
    emojis:
      - "[暗中观察]"
      - "[大笑]"

  neutral:
    label: "中性"
    # 无需关键词，默认分类

# ========== 认知层配置（4分类）==========
cognitive:
  priority_order:
    - resist       # 泛化抵触
    - precise      # 精准认知
    - confused     # 信息混淆
    - unclear      # 无明确认知（默认）

  resist:
    label: "泛化抵触"
    keywords:
      - "所有奶粉"
      - "所有品牌"
      - "都不行"
      - "都有问题"
      - "都不安全"
      - "不如母乳"
      - "干脆不喝"
      - "还是母乳好"
      - "所有"
      - "全部"
      - "一律"

  precise:
    label: "精准认知"
    keywords:
      - "fda"
      - "检出"
      - "仅限美国"
      - "特定批次"
      - "国标"
      - "配方安全"
      - "海关总署"
      - "检测合格"
      - "召回范围"
      - "官方声明"

  confused:
    label: "信息混淆"
    keywords:
      - "分不清"
      - "搞混"
      - "版本"

  unclear:
    label: "无明确认知"
    # 无需关键词，默认分类

# ========== 行动层配置（4分类）==========
action:
  priority_order:
    - rights       # 维权诉求
    - switch       # 转奶流失
    - help         # 寻求帮助
    - none         # 暂无行动（默认）

  rights:
    label: "维权诉求"
    keywords:
      - "12315"
      - "投诉"
      - "索赔"
      - "退换"
      - "退款"
      - "赔偿"
      - "退货"
      - "维权"

  switch:
    label: "转奶流失"
    keywords:
      - "换了"
      - "转奶"
      - "退了"
      - "换回"
      - "准备换"
      - "已经换"
      - "买了国产"
      - "算买国产"
      - "转皇家"
      - "转爱他美"
      - "转德爱"
      - "换飞鹤"
      - "换蓝臻"
      - "换海普"
      - "换1897"
      - "吃完就换"
      - "只喝了一箱"
      - "马上换"
      - "彻底下决心"
      - "再也不会"
      - "绝对不买"

  help:
    label: "寻求帮助"
    keywords:
      - "怎么办"
      - "咋整"
      - "怎么处理"
      - "求推荐"
      - "哪个好"
      - "有没有问题"
      - "是不是"
      - "能不能"
      - "能不能喝"
      - "要不要换"
      - "怎么选"
      - "选哪个"

  none:
    label: "暂无行动"
    # 无需关键词，默认分类

# ========== 纯@无互动配置 ==========
pure_at:
  # 多个@直接判定为纯@
  multiple_at_is_pure: true
  # 需要清除的emoji和标点（用于检查@后是否为空）
  emoji_pattern: '[\U0001F000-\U0001F9FF👏👍❤️🥰😊🙏🎉💪🤔😅😢😭😱😨🫣🤷😂🤣【】、，。：:,.\s]+'

# ========== 评论类型配置 ==========
comment_type:
  long_content_threshold: 100
  competitor_keywords:
    - "爱他美"
    - "美赞臣"
    - "美素佳儿"
    - "雀巢"
    - "惠氏"
    - "海普"
