# A2舆情分析Emoji元数据库 v1.0
# 标准化emoji识别，支持情绪权重配置

version: "1.0"
date: "2026-05-29"

# ========== Emoji情绪分类 ==========
# 每类emoji可以配置多个情绪倾向和权重

emojis:
  # ========== 恐慌/焦虑类 ==========
  panic:
    label: "恐慌焦虑"
    weight: 0.8
    items:
      # 哭泣类
      - "[流泪]"
      - "[泪流]"
      - "[泪奔]"
      - "[泣不成声]"
      - "[大哭]"
      - "[嚎啕大哭]"
      - "[哭泣]"
      # 恐惧类
      - "[害怕]"
      - "[恐怖]"
      - "[发抖]"
      - "[瑟瑟发抖]"
      - "[惊吓]"
      - "[震惊]"
      # 担忧类
      - "[担忧]"
      - "[担心]"
      - "[焦虑]"
      - "[着急]"
      - "[急]"
      # 无奈类
      - "[绝望]"
      - "[绝望的凝视]"
      - "[绝望地哭]"
      - "[发呆]"
      - "[晕]"
      - "[眩晕]"
      # 捂脸类（通常是尴尬或无奈）
      - "[捂脸]"
      - "[捂脸哭]"
      - "[手动捂脸]"
      # 其他负面表情
      - "[裂开]"
      - "[黑脸]"
      - "[尴尬]"
      - "[尴尬流汗]"

  # ========== 愤怒/背叛类 ==========
  anger:
    label: "愤怒背叛"
    weight: 0.9
    items:
      # 愤怒类
      - "[发怒]"
      - "[愤怒]"
      - "[抓狂]"
      - "[怒]"
      - "[生气]"
      # 嘲讽类（冷笑/嘲讽）
      - "[微笑]"
      - "[假笑]"
      - "[嘲笑]"
      - "[讽刺]"
      # 不屑类
      - "[不屑]"
      - "[嫌弃]"
      - "[鄙视]"
      - "[白眼]"
      # 其他
      - "[哼]"
      - "[讨厌]"
      - "[厌恶]"

  # ========== 庆幸/旁观类 ==========
  relief:
    label: "庆幸旁观"
    weight: 0.75
    items:
      # 暗中观察类
      - "[暗中观察]"
      - "[看]"
      - "[吃瓜]"
      - "[围观]"
      # 大笑/得意类
      - "[大笑]"
      - "[狂笑]"
      - "[得意]"
      - "[机智]"
      - "[滑稽]"
      - "[呲牙]"
      # 送花/点赞类
      - "[送花]"
      - "[点赞]"
      - "[鼓掌]"
      - "[真棒]"
      # 调侃类
      - "[调皮]"
      - "[偷笑]"

  # ========== 中性/疑问类 ==========
  neutral:
    label: "中性"
    weight: 0.5
    items:
      # 疑问类
      - "[疑问]"
      - "[困惑]"
      - "[无语]"
      - "[晕]"
      # 中性表情
      - "[思考]"
      - "[想想]"
      - "[抠鼻]"
      - "[无语凝噎]"

  # ========== 正面/积极类 ==========
  positive:
    label: "正面"
    weight: 0.7
    items:
      # 开心类
      - "[开心]"
      - "[高兴]"
      - "[快乐]"
      - "[笑]"
      - "[微笑]"
      - "[可爱]"
      - "[甜]"
      - "[哈哈]"
      # 赞类
      - "[赞]"
      - "[好棒]"
      - "[棒]"
      - "[优秀]"
      - "[厉害]"
      # 爱心类
      - "[爱心]"
      - "[ love]"
      - "[心]"
      # 加油类
      - "[加油]"
      - "[努力]"
      - "[fighting]"
      # 庆祝类
      - "[庆祝]"
      - "[撒花]"
      - "[烟花]"
      - "[鼓掌]"

# ========== Emoji组合情绪增强 ==========
# 当多个特定emoji同时出现时，增强对应情绪权重

combo_boosts:
  # 多个哭泣emoji → 恐慌焦虑增强
  panic_multi:
    condition: "count >= 2"
    emotion: "恐慌焦虑"
    boost: 0.15
    items:
      - "[流泪]"
      - "[泪奔]"
      - "[大哭]"
      - "[泣不成声]"

  # 多个嘲笑emoji → 愤怒背叛增强
  anger_multi:
    condition: "count >= 2"
    emotion: "愤怒背叛"
    boost: 0.15
    items:
      - "[微笑]"
      - "[嘲笑]"
      - "[讽刺]"
      - "[发怒]"

  # 多个暗中观察 → 庆幸旁观增强
  relief_multi:
    condition: "count >= 2"
    emotion: "庆幸旁观"
    boost: 0.15
    items:
      - "[暗中观察]"
      - "[看]"
      - "[吃瓜]"

# ========== Emoji与关键词的组合判断 ==========
# 当emoji + 关键词同时出现时，增强分类准确性

emoji_keyword_combos:
  panic_combos:
    - emoji: "[流泪]"
      keywords: ["吐奶", "拉肚子", "便血", "腹泻", "呕吐", "绿便", "奶瓣"]
      emotion: "恐慌焦虑"
      confidence: 0.9

  relief_combos:
    - emoji: "[暗中观察]"
      keywords: ["好险", "幸好", "多亏", "还好"]
      emotion: "庆幸旁观"
      confidence: 0.85

  anger_combos:
    - emoji: "[发怒]"
      keywords: ["背刺", "资本家", "欺骗", "双标"]
      emotion: "愤怒背叛"
      confidence: 0.95

  positive_combos:
    - emoji: "[开心]"
      keywords: ["放心", "没问题", "安全", "官方"]
      emotion: "正面"
      confidence: 0.85