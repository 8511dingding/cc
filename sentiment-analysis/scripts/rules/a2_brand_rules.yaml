# A2舆情分析品牌识别规则 v1.1
# 整合40个品牌识别规则，支持产品系列、俗称、错拼识别
# 增加错别字容错和拼音匹配

version: "1.1"
date: "2026-05-29"

# ========== A2品牌配置 ==========
a2_brand:
  label: "a2"
  # A2至初/紫白金/紫曜等变体
  patterns:
    - "a2至初"
    - "a2紫白金"
    - "a2紫曜"
    - "至初.*a2"
    - "紫白金.*a2"
    - "紫曜.*a2"
    - "a2至臻"
    - "a2白金"
    - "a2牛奶"
    - "a2婴幼儿"
  # 独立单词a2（排除 a2蛋白质）
  # 使用Unicode感知的方式：a2前面是行首或非字母数字，后面是行尾或非字母数字
  standalone_pattern: "(^|[^a-zA-Z0-9])a2($|[^a-zA-Z0-9])"
  exclude:
    - "a2蛋白质"

