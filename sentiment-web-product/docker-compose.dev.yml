services:
  sentiment-platform-api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./platform/backend/app:/app/app
      - ./platform/backend/tests:/app/tests:ro

  sentiment-platform-web:
    build:
      context: ./platform/frontend
      dockerfile: Dockerfile
      target: dev
    command: npm run dev -- --host 0.0.0.0
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./platform/frontend:/app
      - platform-frontend-node-modules:/app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173/platform/"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 20s

  local-portal:
    volumes:
      - ./local_portal:/usr/share/nginx/html:ro
      - ./nginx/local-portal.dev.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  platform-frontend-node-modules:

