services:
  wqs-mysql:
    image: mysql:8.0
    container_name: wqs-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: GM3750-jm
      MYSQL_DATABASE: wqs_wordpress
    volumes:
      - wqs-mysql-data:/var/lib/mysql
    networks:
      - wqs-net

  sentiment-platform-api:
    build:
      context: ./platform/backend
      dockerfile: Dockerfile
    container_name: sentiment-platform-api
    restart: unless-stopped
    environment:
      APP_ENV: "local"
    networks:
      - wqs-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 20s

  sentiment-platform-web:
    build:
      context: ./platform/frontend
      dockerfile: Dockerfile
    container_name: sentiment-platform-web
    restart: unless-stopped
    networks:
      - wqs-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 10s

  sentiment-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentiment-web
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
    volumes:
      - ./web_system:/app/web_system
    networks:
      - wqs-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8501/sentiment/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  local-portal:
    image: nginx:1.27-alpine
    container_name: local-portal
    restart: unless-stopped
    depends_on:
      - sentiment-platform-api
      - sentiment-platform-web
    ports:
      - "8080:80"
    volumes:
      - ./local_portal:/usr/share/nginx/html:ro
      - ./nginx/local-portal.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - wqs-net

volumes:
  wqs-mysql-data:

networks:
  wqs-net:
    driver: bridge
