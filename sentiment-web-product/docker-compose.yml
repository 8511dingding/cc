services:
  sentiment-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentiment-web
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
    volumes:
      - ./web_system:/app/web_system
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
