server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /sentiment-platform-wireframe.html {
        try_files /sentiment-platform-wireframe.html =404;
    }

    location /api/platform/ {
        proxy_pass http://sentiment-platform-api:8000/api/platform/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /platform/ {
        proxy_pass http://sentiment-platform-web:5173/platform/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    location /platform {
        return 301 /platform/;
    }

    location /sentiment/ {
        proxy_pass http://sentiment-web:8501/sentiment/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    location /sentiment {
        return 301 /sentiment/;
    }

    location /wp_wqs/ {
        index index.php;
        try_files $uri $uri/ /wp_wqs/index.php?$args;
    }

    location /wp_wqs {
        return 301 /wp_wqs/;
    }

    location /images/ {
        alias /usr/share/nginx/html/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/wp_wqs/(wp-content|wp-includes)/.*\.php$ {
        deny all;
    }

    location ~ ^/wp_wqs/.*\.php$ {
        fastcgi_pass host.docker.internal:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME "/Users/jianing/Ning's Git/sentiment-web-product/local_portal$fastcgi_script_name";
        include fastcgi_params;
    }
}
