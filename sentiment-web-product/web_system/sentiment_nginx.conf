# 舆情分析系统 Nginx 配置
# 保存到: /etc/nginx/sites-available/sentiment
# 然后执行: sudo ln -s /etc/nginx/sites-available/sentiment /etc/nginx/sites-enabled/ && sudo nginx -t

server {
    listen 80;
    server_name _;

    # 舆情分析系统子路径配置
    location /sentiment/ {
        proxy_pass http://127.0.0.1:8501/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamlit WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态资源缓存
    location /sentiment/static/ {
        proxy_pass http://127.0.0.1:8501/static/;
        proxy_cache_valid 200 1d;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket 长连接
    location /sentiment/_stcore/ {
        proxy_pass http://127.0.0.1:8501/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # 访问日志
    access_log /var/log/nginx/sentiment-access.log;
    error_log /var/log/nginx/sentiment-error.log;
}