WHEN ACTIVATED THIS BOT PROVIDES LANGUAGE DETERMINATION AND BASIC ROUTING. MUST BE ENABLED UNLESS YOU ARE USING A SEF PLUGIN THAT PERFORMS THE SAME TASKS.=启动这个外挂插件以提供语言决定与基本路径选择。除非你使用的 SEF 外挂插件可执行同样的工作，此外挂插件必须启动。
USE JF ROUTER IF AVAILABLE=如果可以，使用 JF 路由器
ENABLE LANGUAGE DETERMINATION=启用语言决定程序
LANGUAGE SELECTION FOR NEW VISITORS?=如何为新的访客选定语言？
BROWSER SETTINGS=浏览器的设定
SITE DEFAULT LANGUAGE=网站的预设语言
ORDERING OF LANGUAGES IN JOOMFISH COMPONENT=在 Joom!Fish 组件内语言的排序
USE 302 REDIRECT=使用 302 重新导向
SAVE USER LANGUAGE IN A COOKIE=用 cookie 储存使用者语言
USE SEF PREFIX OR SUBDOMAINS?=使用 SEF 前缀词或次网域？
SEF PREFIX=SEF 前缀词
SUB-DOMAIN=次网域
PREFIX=前缀词
SEF SUBDOMAIN=Sef 次网域
