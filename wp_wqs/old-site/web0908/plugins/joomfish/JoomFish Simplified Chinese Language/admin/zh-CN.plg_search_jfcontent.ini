ALLOWS SEARCHING OF TRANSLATIONS OF ALL ARTICLES=允许搜寻文章信息的翻译
SEARCH LIMIT=搜寻限制
ACTIVE LANGUAGE ONLY=只包含正在使用的语言
NUMBER OF SEARCH ITEMS TO RETURN=搜寻结果的项目数
SEARCH ONLY WITHIN ACTIVE LANGUAGE?=只搜寻正在使用的语言？
CONTENT ITEMS=内容项目
UNCATEGORISED CONTENT=未分类的内容
ARCHIVED CONTENT=已封存的内容
SEARCH ARCHIVED CONTENT?=搜寻已封存的内容？
SEARCH UNCATEGORISED CONTENT?=搜寻未分类的内容？
SEARCH CONTENT ITEMS?= 搜寻内容项目？
