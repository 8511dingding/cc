DESCMODULLANGUAGESELECTION=这个模块在你的网站上放置一个语言选择器
APPEARANCE OF LANGUAGE SELECTOR=语言选择器的外观
SHOW ACTIVE LANGUAGE=显示目前使用的语言？
SELECT WETHER THE ACTIVE LANGUAGE SHOULD BE SHOWN OR NOT=选择是否要显示目前使用的语言？
INCLUDE JOOM!FISH CSS=包含入 Joom!Fish CSS 档案
TELLS THE MODULE IF THE MODULE JOOM!FISH CSS SHOULD BE INCLUDED OR NOT.=告诉模块是否将 Joom!Fish CSS 档案包含进来。
CACHE HREF TRANSLATION=快取 href 转译
SELECT WHETHER TO CACHE THE RESULT OF THE ROUTING OF THE TRANSLATED URL=选择是否要将转译过之 URL 路径结果存入快取。
A SUFFIX TO BE APPLIED TO THE CSS CLASS OF THE MODULE (TABLE.MODULETABLE), THIS ALLOWS INDIVIDUAL MODULE STYLING=加到模块之 CSS 类别的后置字符串(table.moduletable)，这允许个别模块能有自己的风格。
DROP DOWN OF NAMES=名称的下拉选单
DROP DOWN OF NAMES WITH CURRENT LANGUAGE FLAG=名称的下拉选单附加目前语言的旗帜
UL-LIST OF NAMES=名称的 ul 列表
UL-LIST OF NAMES WITH FLAG=名称以及旗帜的 ul 列表
UL-LIST OF IMAGES=图像的 ul 列表
RAW DISPLAY OF IMAGES=单纯显示图像
