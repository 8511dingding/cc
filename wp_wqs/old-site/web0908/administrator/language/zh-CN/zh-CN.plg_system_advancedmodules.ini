ADVANCED MODULE MANAGER - ADVANCED OPTIONS FOR MODULES IN JOOMLA!=<a href="http://www.joomlagate.com/index.php?option=com_remository&Itemid=48&func=fileinfo&id=44" target="_blank">Advanced Module Manager</a> - 为你的 Joomla 后台模块分配/发布页面提供更高级的选项。 <p><h3>技术支持</h3>如果您在使用中遇到问题，欢迎到 <a href="http://www.joomlagate.com/forum/" target="_blank">Joomla! 中文论坛（Joomla! 之门）</a> 发帖讨论。</p><p>中文汉化：<a href="http://www.baijianpeng.com" target="_blank">白建鹏 </a></p><a href="http://www.joomlagate.com/component/option,com_smf/Itemid,31/topic,3907.0/" target="_blank" title="Donate to joomlagate.com"><img src="http://www.joomlagate.com/images/logo-green.gif" alt="用支付宝向 joomlagate.com 捐款" border="0" /></a>
WITH ADVANCED MODULE MANAGER YOU HAVE EXTRA OPTIONS AND FUNCTIONALITIES TO CONTROL YOUR MODULES=借助 Advanced Module Manager ，你可以更灵活地控制模块的发布/分配功能。

ACTIVE MODULES=活动模块
NO ACTIVE MODULES=没有活动模块

SHOW ACTIVE MODULES=显示活动模块
SHOW ACTIVE MODULES (DESCRIPTION)=如果启用，在“菜单项目”编辑页面上你将看到额外的滑动模块，显示针对该菜单项目的所有活动模块列表。

EDIT MODULES IN MODALS=显示“在弹出窗口中打开”图标？
EDIT MODULES IN MODALS (DESCRIPTION)=如果启用，在“模块管理”列表上，每一个模块名称前面都会显示一个小图标。如果你点击该图标，该模块的编辑（参数）页面将在一个弹出窗口中打开。<br /><br />

SHOW EXTRA PUBLISHING OPTIONS=显示附加发布选项
SHOW PUBLISHING OPTION=在模块编辑页面上显示此发布选项？
SELECT DEFAULT OPTION=默认选择哪种选项

HIDE IF EMPTY=无内容就隐藏
MIRROR MODULE=模仿另一个模块
MATCHING METHOD=匹配方式

