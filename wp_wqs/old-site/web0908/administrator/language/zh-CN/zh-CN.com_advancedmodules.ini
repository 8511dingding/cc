ADVANCED MODULE MANAGER - ADVANCED OPTIONS FOR MODULES IN JOOMLA!=Advanced Module Manager - 为你的 Joomla 后台模块分配/发布页面提供更高级的选项。<p><h3>技术支持</h3>如果您在使用中遇到问题，欢迎到 <a href="http://www.joomlagate.com/forum/" target="_blank">Joomla! 中文论坛（Joomla! 之门）</a> 发帖讨论。</p><p>中文汉化：<a href="http://www.baijianpeng.com" target="_blank">白建鹏 </a></p><a href="http://www.joomlagate.com/component/option,com_smf/Itemid,31/topic,3907.0/" target="_blank" title="Donate to joomlagate.com"><img src="http://www.joomlagate.com/images/logo-green.gif" alt="用支付宝向 joomlagate.com 捐款" border="0" /></a>

OPEN IN MODAL WINDOW=在弹出窗口中打开

HIDE IF EMPTY=如果无内容就隐藏
HIDES THE MODULE IF ITS OUTPUT IS EMPTY=如果模块无内容输出就隐藏该模块。 (以避免出现前台只有模块标题而没有内容的尴尬局面).

MODULE ASSIGNMENT=模块分配

MIRROR MODULE=模仿另一个模块
MIRROR MODULE (DESCRIPTION)=你可以模仿另一个模块的分配规则，也就是让本模块使用与另一个模块完全一样的分配规则。
MIRROR MODULE ID=模块 ID
MIRROR MODULE ID (DESCRIPTION)=输入你要模仿的那个模块的 ID。本模块将完全继承你所指定的那个模块的分配规则。

MOVE TO POSITION=移动到其它位置
MODULES BEING MOVED=要移动的模块
PLEASE SELECT A POSITION FROM THE LIST=请从列表中选择一个模块位置
MODULES MOVED TO=%s 个模块已移动到 %s 位置

ACCESS LEVEL=访问权限
SELECT ACCESS LEVEL=选择访问权限

MENU ITEM ASSIGNMENT=菜单项目分配
SELECT MENU ITEM ASSIGNMENT=选择指派菜单项目
SELECT MENU ITEM ASSIGNMENT (DESCRIPTION)=<strong>全部</strong><br />显示没有指派特定菜单项目的全部模块。<br /><br /><strong>变化</strong><br />按照所选菜单项目显示模块。<br /><br /><strong>无</strong><br />显示那些在指派菜单时没有选择任何菜单项目的模块。
MODULE ASSIGNMENT (DESCRIPTION)=你可以组合使用下列发布分配规则。<br />例如：如果你只想让此模块发布在某个特定的菜单项目上，并且只在指定日期范围内发布，则分别设置“菜单项目”与“日期”规则即可。
SELECTION=选择
EXCLUDE SELECTION=除外所选
ALL (DESCRIPTION)=在全部 %s 发布此模块
SELECTION (DESCRIPTION)=在所选的 %s 发布此模块
EXCLUDE SELECTION (DESCRIPTION)=在除了所选的 %s 之外页面上都发布此模块
NONE (DESCRIPTION)=在全部 %s 都不发布此模块
SELECT=选择
INCLUDE=包括
EXCLUDE=除外
PUBLISH ON=发布在
PUBLISH ON ...=发布在 %s?
MENU ITEMS=菜单项目
SECTIONS / CATEGORIES=单元/类别
ARTICLES=文章
COMPONENTS=组件
DATE=日期
USER GROUP LEVELS=用户群组级别
NOT LOGGED IN=未登录
LANGUAGES=语言
TEMPLATES=模板
ALL=全部
MATCHING METHOD=匹配方式
MATCHING METHOD (DESCRIPTION)=应用全部规则还是任意所选规则？<br /><br /><strong>示范</strong><br/>你选择了某个类别和某个用户群组.<br /><strong>与</strong>: 模块只发布在该类别页面，并且只针对该用户群组.<br /><strong>或</strong>: 模块将发布在该类别页面，针对任何人；同时也将针对该用户群组而发布在任何类别页面上。
-AND=与
-AND (DESCRIPTION)=只有当下面的分配规则 <strong>全部</strong> 符合时，才显示模块. (类似搜索时的 AND 关系)
-OR=或
-OR (DESCRIPTION)=只要下面的分配规则中 <strong>任意</strong> (一个或多个) 符合，就显示本模块。(类似搜索时的 OR 关系)
-PUBLISHING ASSIGNMENTS=发布分配
-MATCHING METHOD=匹配方式
-MATCHING METHOD (DESCRIPTION)=要匹配全部指派还是任意指派？<br /><br /><strong>及</strong><br/>如果满足下面 <strong>全部</strong> 指派就发布。<br /><br /><strong>或</strong><br/>满足下面 <strong>任意</strong> 指派就发布（一个或多个）。<br />如果选“全部”，则群组指派将被忽略。
-ASSIGN TO=分配到
-ASSIGN TO (DESCRIPTION)=选择分配发布的范围。<br /><br /><strong>选择</strong><br />只在所选范围发布。<br /><br /><strong>除外所选</strong><br />除了所选的范围不发布，其它所有位置都发布。<br /><br /><strong>全部</strong><br />分配方式不限制于某个所选范围。
-SELECTION=选择
-EXCLUDE SELECTION=除外所选
-ALL=全部
-MENU ITEMS=菜单项目
-MENU ITEMS (DESCRIPTION)=选择要分配的菜单项目。
-ALSO ON CHILD ITEMS=同样针对子项目。
-ALSO ON CHILD ITEMS (DESCRIPTION)=同样分配给所选项目的子项目？
-INCLUDE NO ITEMID=包括无 Itemid 的
-INCLUDE NO ITEMID (DESCRIPTION)=当 URL 中没有 Itemid 时也分配？
-SECTIONS / CATEGORIES=单元/类别
-SECTIONS / CATEGORIES (DESCRIPTION)=选择要分配的单元/类别
-PAGE TYPES=页面类型
-PAGE TYPES (DESCRIPTION)=选择分配方案要生效的页面类型
-SECTIONS=单元
-CATEGORIES=类别
-OTHERS=其它
-K2 CATEGORIES=K2 类别
-ITEMS=文章
-CATEGORY IDS=类别 ID
-CATEGORY IDS (DESCRIPTION)=输入要分配的类别 ID，多个 ID 请用英文逗号分隔。
-ARTICLES=文章
-ARTICLE IDS=文章 ID
-ARTICLE IDS (DESCRIPTION)=输入要分配的文章 ID，多个 ID 请用英文逗号分隔。
-COMPONENTS=组件
-COMPONENTS (DESCRIPTION)=选择要指派的菜单项目
-URL=URL
-URL PARTS=URL 匹配
-URL PARTS (DESCRIPTION)=将使用非友好网址（non-SEF）进行匹配。<br /><br />每一行输入一个配对。<br /><br />URL 中的部分将通过正则表达式来匹配。请确保字串使用了有效的正则表达式语法。
-DATE=日期
-START PUBLISHING=开始发布
-START PUBLISHING (DESCRIPTION)=输入发布开始的日期。
-FINISH PUBLISHING=结束发布
-FINISH PUBLISHING (DESCRIPTION)=输入发布结束的日期。
-USER GROUP LEVELS=用户群组级别
-USER GROUP LEVELS (DESCRIPTION)=选择要分配的用户群组级别。
-USERS=用户
-USER IDS=用户 ID
-USER IDS (DESCRIPTION)=输入要分配的用户 ID，多个 ID 请用英文逗号分隔。
-LANGUAGES=语言
-LANGUAGES (DESCRIPTION)=选择要分配的语言。
-TEMPLATES=模板
-TEMPLATES (DESCRIPTION)=选择要分配的模板。
-PHP=PHP 代码
-PHP (DESCRIPTION)=输入一段用来评价的 PHP 代码。这段代码返回的值必须是 true 或 false.<br /><br />例如:<br /><br />$user =& JFactory:&zwj;:getUser();<br />return ( $user->name == 'Peter van Westen' );

-MIGHTY RESOURCE CATEGORIES=Mighty Resource 类别
-BROWSERS=浏览器