JOTCACHE_PLG_DESC=这个插件可给 Joomla 1.5 网站增加高级缓存功能。JotCache 管理功能都在 JotCache 组件中进行设置。<br/>你可以点击顶部工具栏上的帮助按钮获得简单的帮助。官方网站也提供了 <p><a href="http://www.kanich.net/radio/site/component/content/article/92" target="_blank" >本插件的详细帮助（及JotCache 的常规帮助）</a></p><p><h3>技术支持</h3>如果您在使用中遇到问题，欢迎到 <a href='http://www.joomlagate.com/forum/' target='_blank'>Joomla! 中文论坛（Joomla! 之门）</a> 发帖讨论。</p><p>中文汉化：<a href='http://www.baijianpeng.com' target='_blank'>白建鹏 </a></p><a href='http://www.joomlagate.com/index.php?option=com_smf&Itemid=31&topic=3907.0' target='_blank' title='Donate to joomlagate.com'><img src='http://www.joomlagate.com/images/logo-green.gif' alt='用支付宝向 joomlagate.com 捐款' border='0' /></a>
JOTCACHE_BROWSER_LBL=使用浏览器缓存
JOTCACHE_BROWSER_DESC=如果选择“是”， 将使用浏览器的缓存功能来储存页面缓存。
JOTCACHE_LIFE_LBL=缓存时间
JOTCACHE_LIFE_DESC=页面的缓存时间（单位：分钟）
JOTCACHE_CMP_LBL=压缩缓存的内容
JOTCACHE_CMP_DESC=如果选择“是”，在将页面缓存储存到缓存之前会先对其内容进行压缩。
JOTCACHE_MARK_LBL=标志缓存
JOTCACHE_MARK_DESC=(只针对当前管理员！)<br/>如果选择“是”，就可以在 JotCache 组件中设置标志，以标记出 cookie, 它将保存在访客的浏览器中。cookie 可以实现前台访问时更容易的页面缓存检查。
