ENABLE AUTOMATIC PURGE=启用自动清理
NO=否
YES=是
PURGE FREQUENCY=清理频率
HOURLY=每小时
DAILY=每天
WEEKLY=每星期
MONTHLY=每个月
PURGE FREQUENCY MULTIPLE=清理频率倍数
FREQUENCY MULTIPLE.  (IE. 6 HOURS, 3 DAYS, ETC.)=填写一个数字，可以将上面指定的清理频率加倍。例如，上面选择了“每小时”，这里填写 6，就表示“每6小时清理一次”。
ENABLE EMAIL ALERT=启用邮件通知
EMAIL ALERT TO=通知邮件发送给
EMAIL AUTO PURGE CACHE REPORTS TO THESE ADDRESSES (COMMA DELIMITED)=将自动清理的报告发送给这些 email 地址。如果要填写多个 email 地址，请以英文逗号分隔。
EMAIL SENDER NAME=邮件发件人姓名
EMAIL SUBJECT=邮件主题
EMAIL MESSAGE=邮件正文

