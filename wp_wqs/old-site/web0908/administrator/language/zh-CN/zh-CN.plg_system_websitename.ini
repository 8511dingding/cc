DISPLAY THE TITLE OF YOUR WEBSITE IN THE NAVIGATOR BAR=在浏览器标题栏显示你的网站名称
INSERT YOUR WEBSITE NAME BEFORE OR AFTER THE PAGE DESCRIPTION (SEO IMPROVEMENT)=在页面标题的前面或者后面插入网站名称(促进 SEO)
BEFORE=之前
AFTER=之后
SEPARATOR=分隔符
CHAR USED TO SEPARATE THE NAME AND THE DESCRIPTION=用来分隔开网站名称与页面标题的字符