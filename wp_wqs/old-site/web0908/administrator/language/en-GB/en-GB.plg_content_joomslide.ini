###########
SHOW_ERRORS= Show errors
DESC_SHOW_ERRORS= Show/Hide JoomSlide errors.

############
#Thumbnail
############
FORCE_ASPECT_RATIO=Force aspect ratio
DESC_FORCE_ASPECT_RATIO=Force thumbnail aspect ratio whitout miss original aspect ratio.

CHANGE_ASPECT_RATIO=Aspect ratio
DESC_CHANGE_ASPECT_RATIO=Select aspect ratio. Only available if force aspect ratio enabled.

ASPECT_RATIO=Aspect Ratio
DEC_ASPECT_RATIO=Thumbnail aspect ratio

CROP_AREA=Crop area
DESC_CROP_AREA=Crop area. Only available if force aspect ratio enabled.

USE_ERROR_IMAGE=Default image error
DESC_USE_ERROR_IMAGE=If an image can not be displayed, JoomSlide load an image by default.

PATH_ERROR_IMAGE=Image error path
DESC_PATH_ERROR_IMAGE=Path to default image error.

