DESC_THUMBNAIL_BORDER_COLOR=CSS color format. Example: #777777. Only avaible if custom colors enable.

THUMBNAIL_BORDER_COLOR_HOVER=Thumb border (hover)
DESC_THUMBNAIL_BORDER_COLOR_HOVER=CSS color format. Example: #777777. Only avaible if custom colors enable.

