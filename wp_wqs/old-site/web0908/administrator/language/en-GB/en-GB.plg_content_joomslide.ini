HEADER_TEXT_COLOR=Header text
DESC_HEADER_TEXT_COLOR=CSS color format. Example: #777777. Only avaible if custom colors enable.

IMAGE_BORDER_COLOR=Image border
DESC_IMAGE_BORDER_COLOR=CSS color format. Example: #777777. Only avaible if custom colors enable.

CAPTION_BACKBROUND_COLOR=Caption background
DESC_CAPTION_BACKBROUND_COLOR=CSS color format. Example: #777777. Only avaible if custom colors enable.

CAPTION_TEXT_COLOR=Caption text
DESC_CAPTION_TEXT_COLOR=CSS color format. Example: #777777. Only avaible if custom colors enable.

