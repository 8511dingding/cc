#Added in 1.4 beta 2
DESC_LOADING_COLOR=CSS color format. Example: #777777. Only avaible if custom colors enable.

#Added in 1.4 beta 2
LOADING_BACKGROUND=Loading background
#Added in 1.4 beta 2
DESC_LOADING_BACKGROUND=CSS color format. Example: #777777. Only avaible if custom colors enable.

#############
#SlideShow
#############
FIXED_CONTROLS=Fixed controls
DESC_FIXED_CONTROLS=When this is enabled, Highslide aligns subsequent slides so that the controls are in the same position for the next image. This means the user can browse through the images using the 'Next' button without moving the mouse. If fixedControls is set to 'fit', Highslide fixes the controls when possible, but ensures that the popup stays within the viewport.

TRANSITION_DURATION=Transition duration
DESC_TRANSITION_DURATION=Applies to the transition between two expanders. Value in ms.

SLIDESHOW_REPEAT=Repeat
DESC_SLIDESHOW_REPEAT=Repeat slideshow when finish.

###############
#Control bar
###############
BAR_WIDTH=Width
DESC_BAR_WIDTH=Control bar width. Be careful with this option.

BAR_FIRST_POSITION=Vertical position
DESC_BAR_FIRST_POSITION=Control bar vertical position.

BAR_SECOND_POSITION=Horizontal position
DESC_BAR_SECOND_POSITION=Control bar horizontal position.

#########
#Caption
#########
CAPTION_OVERLAY=Overlay
DESC_CAPTION_OVERLAY=Caption overlay.

CAPTION_OVERLAY_OPACITY=Opacity
DESC_CAPTION_OVERLAY_OPACITY=Caption overlay opacity.

CAPTION_OVERLAY_WIDTH=Width
DESC_CAPTION_OVERLAY_WIDTH=Caption overlay width. Be careful with this option.

CAPTION_OVERLAY_HIDE_ON_MOUSE=Hide on mouse
DESC_CAPTION_OVERLAY_HIDE_ON_MOUSE=Caption overlay hide on mouse.

CAPTION_OVERLAY_FIRST_POSITION=Vertical position
DESC_CAPTION_OVERLAY_FIRST_POSITION=Caption overlay vertical position.

CAPTION_OVERLAY_SECOND_POSITION=Horizontal position
DESC_CAPTION_OVERLAY_SECOND_POSITION=Caption overlay horizontal position.

#################
#Expanded Image
#################
MULTIPLE_INSTANCES=Multiple Instances
DESC_MULTIPLE_INSTANCES=Enable or disable multiple instances in full image.

EXPAND_DURATION=Expand duration
DESC_EXPAND_DURATION=Defines in milliseconds how long the zoom in effect should take.

EXPAND_STEPS=Expand steps
DESC_EXPAND_STEPS=Expand steps when expand image.

RESTORE_STEPS=Restore steps
RESTORE_STEPS=Restore steps when restore image

ANCHOR=Anchor
DESC_ANCHOR=Which corner or side of the thumbnail the popup should be anchored to

##############
#Close Button
##############
CLOSE_BUTTON_FIRST_POSITION=Vertical position
DESC_CLOSE_BUTTON_FIRST_POSITION=Close button Vertical position.

CLOSE_BUTTON_SECOND_POSITION=Horizontal position
DESC_CLOSE_BUTTON_SECOND_POSITION=Close button Horizontal position.

#########
#Drag
#########
DRAG_SENSITIVITY=Sensitivity
DESC_DRAG_SENSITIVITY=How many pixels to drag the full image before it starts moving.

#########################
#Background Dimming
#########################
DIMMING_OPACITY=Opacity
DESC_DIMMING_OPACITY=Only avaible if 'Background Dimming' enable. Float value from 0 to 1.

DIMMING_DURATION=Duration
DESC_DIMMING_DURATION=Only avaible if 'Background Dimming' enable. The duration in milliseconds of the fading in and out of the background dimming effect. Value in ms.

###########
#Efects
###########
ADVANCED_EFECTS=Advanced effects
DESC_ADVANCED_EFECTS=If you change Highslide path, make sure you have 'ActionScript 1.0 Equations' library in the same directory.

EXPAND_EFFECT=Expand
DESC_EXPAND_EFFECT=Sets the style of the expand effect. Only avaible if Advanced Efects enable.

CONTRACT_EFFECT=Contract
DESC_CONTRACT_EFFECT=Sets the style of the contract effect. Only avaible if Advanced Efects enable.

############
#HighSlide
############
FORCE_INCLUDE_HEADER= Include Header always
DESC_FORCE_INCLUDE_HEADER= By default, HighSlide library is added to the header only in the articles using JoomSlide. If you want to use Highslide without using JoomSlide, set this option to YES.

ALLOW_FLASH=Allow Flash
DESC_ALLOW_FLASH=If you use Highslide with flash objects, you must set to YES and select 'highslide-full(packed) script

HIGHSLIDE_PATH=Highslide path
DESC_HIGHSLIDE_PATH=If you change path, make sure you have 'ActionScript 1.0 Equations' library in the same directory. The library is necessary for advanced expand/contract effect of expansion. More info http://highslide.com/ref/hs.easing

HIGHSLIDE_SCRIPT=Highslide script
DESC_HIGHSLIDE_SCRIPT=Highslide Script.

