JOOMSLIDE_DESCRIPTION=<p style="text-align: center;">JoomSlide creates thumbnails automatically in your content using HighSlide to expand the image.</p><p style="text-align: center;"><a href="http://highslide.com/">Highslide </a>JS is not free for commercial use, if you use it in commercial sites, please buy a license</p><p style="text-align: center;">Go JoomSlide <a href="http://joomlacode.org/gf/project/joomslide/wiki/" target="_blank">Wiki</a> for know how use it</p><p style="text-align: center;">Go JoomSlide <a target="_blank" href="http://joomlacode.org/gf/project/joomslide/forum/">forum</a> or write a email <a href="mailto:joomslide@gmail.com">joomslide@gmail.com</a> to get support</p><p style="text-align: center;">You need a new feature? write a email  <a href="mailto:joomslide@gmail.com">joomslide@gmail.com</a>&nbsp;</p><p style="text-align: center;">Go <a target="_blank" href="http://extensions.joomla.org/extensions/photos-&amp;-images/articles-images/6750/details">JED</a> and write a review</p><p style="text-align: center;"><strong>If you want, you can donate<br /></strong></p><p style="text-align: center;"><a target="_blank" href="https://www.paypal.com/cgi-bin/webscr?cmd=_s-xclick&amp;hosted_button_id=2409027"><img alt="Donate" src="https://www.paypal.com/en_US/i/btn/btn_donate_LG.gif" /></a></p>

#########################
##  PLUGIN PARAMETERS  ##
#########################

##########
#General
##########
#Changed in 1.4 beta 2
APPLY_ALL_IMAGES=Images to apply
DESC_APPLY_ALL_IMAGES=Apply to all images, only with 'class=joomslide' attribute, or except 'class=joomslide' attribute

###########
#Thumbnail
###########
MAX_THUMB_SIZE= Size by
DESC_MAX_THUMB_SIZE=Thumbnail size by Width or Height.

#Changed in 1.4 beta 2
SIZE_THUMBNAILS=Default size
DESC_SIZE_THUMBNAILS=Thumbnail image default size when you use joomslide class name. In pixels.

#Added in 1.4 beta 2
SMALL_SIZE_THUMBNAILS=Small size
DESC_SMALL_SIZE_THUMBNAILS=Thumbnail image size when you use joomslide-s class name. In pixels.

#Added in 1.4 beta 2
MEDIUM_SIZE_THUMBNAILS=Medium size
DESC_MEDIUM_SIZE_THUMBNAILS=Thumbnail image size when you use joomslide-m class name. In pixels.

#Added in 1.4 beta 2
LARGE_SIZE_THUMBNAILS=Large size
DESC_LARGE_SIZE_THUMBNAILS=Thumbnail image size when you use joomslide-l class name. In pixels.

QUALITY_THUMBNAILS=Quality 
DESC_QUALITY_THUMBNAILS=Thumbnail quality. Value from 1 to 100.

THUMB_FORMAT=Format
DESC_THUMB_FORMAT=Thumbnail image format. If auto is selected, thumbnail has same format than original image

THUMBNAILS_PATH=Path
DESC_THUMBNAILS_PATH=Path to save thumbnails pictures.

SHOW_THUMB_WHEN_EXPAND=Show always
DESC_SHOW_THUMB_WHEN_EXPAND=Hide or show thumbnail when expand image.

RESIZE_IMAGE=Resize image
DESC_RESIZE_IMAGE=If you select 'except resized', thumbnail of image resized will be created with her size.

THUMB_BIGGER_IMAGE=Resize small image
DESC_THUMB_BIGGER_IMAGE= If the image is smaller than thumbnail size, JoomSlide can create thumbnail more big than image. If you set NO, if the image is more small than thumbnail size, then takes original size.

#########
#Cache
#########
CACHE_THUMBNAILS=Cache
DESC_CACHE_THUMBNAILS=Check if the thumbnail exists in the directory before create it, for best performance.

CACHE_TIME_THUMBNAILS=Lifetime
#Changed in 1.4 beta 2
DESC_CACHE_TIME_THUMBNAILS= Thumbnail lifetime. In minutes. Set 0 to disabled renew cache

########
#Color
########
WRAPPER_COLOR=Wrapper
DESC_WRAPPER_COLOR=Main wrapper color.

BORDER_EXPANDED_PICTURE_TYPE=Full image border
DESC_BORDER_EXPANDED_PICTURE_TYPE=Full image border color.

############
#SlideShow
############
SLIDESHOW_INTERVAL=Interval time
DESC_SLIDESHOW_INTERVAL=Slideshow interval time. In ms.

ENABLE_SLIDESHOW= SlideShow
DESC_ENABLE_SLIDESHOW= SlideShow.

KEY_LISTENER=Key listener
DESC_KEY_LISTENER=Listen for keystrokes like left and right arrow to control slideshow.

###############
#Control Bar
###############
CONTROL_BAR_IN_EXPANDED_PICTURES=Control bar
DESC_CONTROL_BAR_IN_EXPANDED_PICTURES=Show control bar in full image. SlideShow must be enabled.

BAR_OPACITY=Opacity
DESC_BAR_OPACITY=Control bar opacity.

BAR_HIDE_ON_MOUSE=Hide on mouse
DESC_BAR_HIDE_ON_MOUSE=Hide on mouse control bar.

############
#Caption
############
CAPTION_TEXT=Text
DESC_CAPTION_TEXT=Use the thumbnail's attributes for caption text

#Added in 1.4 beta 2
TEXT_POSITION=Text position
#Added in 1.4 beta 2
DESC_TEXT_POSITION=Where to inject the text of the current image in a sequence.

NUMBER_POSITION=Number position
DESC_NUMBER_POSITION=Where to inject a text showing the number of the current image in a sequence.

##################
#Expanded image
##################
ALIGN=Align
DESC_ALIGN=Position of the full image in the client, either 'auto' or 'center'.

ALLOW_SIZE_REDUCTION=Allow size reduction
DESC_ALLOW_SIZE_REDUCTION=If the viewport is small, the full image by default shrink to fit the area.

FADE_IN_OUT=Fade in out
DESC_FADE_IN_OUT=Add a fading effect to the regular expand/contract effect.

RIGHT_CLICK=Right Click
DESC_RIGHT_CLICK=Enable or disable right click in full image.

#########
#Events
#########
OPEN_IMAGE_EVENT=Open
DESC_OPEN_IMAGE_EVENT=Event to open image.

CLOSE_IMAGE_EVENT=Close
DESC_CLOSE_IMAGE_EVENT=Event to close image. 'On mouse out' event need highslide-full(packed) script.

#########
#Drag
#########
DRAG_BY_HEADING=Drag by heading
DESC_DRAG_BY_HEADING=Allow the full image to be dragged by it's heading.

###############
#Close Button
###############
SHOW_CLOSE_BUTTON=Show close button
DESC_SHOW_CLOSE_BUTTON=Show Mac style close button.

#########################
#Background Dimming
#########################
BACKGROUND_DIMMING=Background dimming
DESC_BACKGROUND_DIMMING=Enable background dimming. If enabled, 'multiple instances' will be disabled.

DIMMING_COLOR=Color
DESC_DIMMING_COLOR=Only avaible if 'Background Dimming' enable. CSS color format. Example: #777777

##########
#Credits
##########
CREDITS=Credits
DESC_CREDITS=Select credits to show.

URL_CREDITS=URL credits
DESC_URL_CREDITS=Do linkable credits.

CUSTOM_CREDITS=Custom credits
DESC_CUSTOM_CREDITS=You can show custom credits.

CUSTOM_URL=Custom URL
DESC_CUSTOM_URL=You can link custom URL. Example: http://www.joomla.org


