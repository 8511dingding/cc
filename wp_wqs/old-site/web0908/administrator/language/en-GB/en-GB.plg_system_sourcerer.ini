# Main
SOURCERER - PLACE ANY CODE IN JOOMLA!=<b>Sourcerer</b> - place any code in Joomla!

THE SOURCERER PLUGIN HANDLES ALL THE SOURCERER SYNTAX TAGS IN YOUR SITE=<p>The Sourcerer plugin handles all the Sourcerer syntax tags in your site.</p><p>You can place your html, javascript, css and php code (including there own tags) inside the Sourcerer tags:<br /><span style="color:green">{source}<span style="color:blue">Your code</span>{/source}</span></p><p>Sourcerer reads all the code and strips it from all html markup. So giving code colors and such is no problem.<br />If you want to use Sourcerer code somewhere else than in an editor (like through ReReplacer), you probably don\'t want html cleaned. You can do that like this:<br /><span style="color:green">{source 0}<span style="color:blue">Your non-HTML code</span>{/source}</span></p>

# Parameters
SYNTAX WORD=Sourcerer tag word
SYNTAX WORD (DESCRIPTION)=This defines the word to use as the Sourcerer syntax tag.<br /><br />Default is 'source'. Which means the tags to use are:<pre>{source}...{/source}</pre>
ENABLE PHP DEBUGGING=Enable PHP Debugging
ENABLE PHP DEBUGGING (DESCRIPTION)=If enabled, Sourcerer will give an a PHP Debugging error table if you have errors in the PHP code.<br />This can only be seen on the frontend if you are logged in as (Super) Administrator.

SECURITY SETTINGS - DEFAULT=Security Settings - Default
SECURITY SETTINGS - DEFAULT (DESCRIPTION)=Here you can set what kind of code can be used within the Sourcerer tags. All code that is not permitted will be stripped away. For more precise settings, see the Advanced Security settings.

ALLOW CSS TAGS=Allow CSS tags
ALLOW CSS TAGS (DESCRIPTION)=If enabled, CSS (style & link) tags are permitted within the Sourcerer tags. Otherwise the CSS tags (and the CSS code within) will be stripped.
ALLOW JAVASCRIPT TAGS=Allow JavaScript tags
ALLOW JAVASCRIPT TAGS (DESCRIPTION)=If enabled, JavaScript (script) tags are permitted within the Sourcerer tags. Otherwise the JavaScript tags (and the JavaScript code within) will be stripped.
ALLOW PHP TAGS=Allow PHP tags
ALLOW PHP TAGS (DESCRIPTION)=If enabled, PHP tags are permitted within the Sourcerer tags. Otherwise the PHP tags (and the PHP code within) will be stripped.
FORBIDDEN PHP FUNCTIONS=Forbidden PHP functions
FORBIDDEN PHP FUNCTIONS (DESCRIPTION)=A comma separated list of PHP functions that are forbidden. The whole PHP block of code will not be executed if it contains any of these functions.
FORBIDDEN (HTML) TAGS=Forbidden (HTML) Tags
FORBIDDEN (HTML) TAGS (DESCRIPTION)=A comma separated list of tags that are forbidden. These tags will be stripped, and also any code in between double tags.

EXTRA FORBIDDEN PHP FUNCTIONS=Extra Forbidden PHP functions
EXTRA FORBIDDEN PHP FUNCTIONS (DESCRIPTION)=A comma separated list of PHP functions to add to the forbidden list (see Default settings)
EXTRA FORBIDDEN (HTML) TAGS=Extra Forbidden (HTML) Tags
EXTRA FORBIDDEN (HTML) TAGS (DESCRIPTION)=A comma separated list of tags to add to the forbidden list (see Default settings)

SECURITY SETTINGS - ARTICLES=Security Settings - Articles
SECURITY SETTINGS - ARTICLES (DESCRIPTION)=These settings have effect on Articles, Categories and Sections.<br />The security settings only have effect on articles.
ENABLE IN ARTICLES=Enable in articles
ENABLE IN ARTICLES (DESCRIPTION)=Select whether to enable the use of the syntax in articles.
SECURITY LEVEL=Security Level
SECURITY LEVEL (DESCRIPTION)=Set the level of security. Sourcerer tags will be stripped from articles with an owner (creator) below this group level.
CSS SECURITY LEVEL=CSS Security Level
CSS SECURITY LEVEL (DESCRIPTION)=Set the level of security. CSS tags (and the CSS code within) will be stripped from articles with an owner (creator) below this group level. If the overall security level is set higher, it will overrule this.
JAVASCRIPT SECURITY LEVEL=JavaScript Security Level
JAVASCRIPT SECURITY LEVEL (DESCRIPTION)=Set the level of security. JavaScript tags (and the JavaScript code within) will be stripped from articles with an owner (creator) below this group level. If the overall security level is set higher, it will overrule this.
PHP Security Level=PHP Security Level
PHP Security Level (DESCRIPTION)=Set the level of security. PHP tags (and the PHP code within) will be stripped from articles with an owner (creator) below this group level. If the overall security level is set higher, it will overrule this.

SECURITY SETTINGS - COMPONENTS=Security Settings - Components
SECURITY SETTINGS - COMPONENTS (DESCRIPTION)=These settings have effect on the component area.<br />You can select in which components Sourcerer should not be enabled. Advise is to not allow Sourcerer in components that non-backend users can post content in.
ENABLE IN COMPONENTS=Enable in components
ENABLE IN COMPONENTS (DESCRIPTION)=Select whether to enable the use of the syntax in components.
DISABLE IN COMPONENTS=Disable on Components
DISABLE IN COMPONENTS (DESCRIPTION)=Select which components NOT to enable Sourcerer in. This is a list of your installed frontend components.

SECURITY SETTINGS - OTHER AREAS=Security Settings - Other Areas
SECURITY SETTINGS - OTHER AREAS (DESCRIPTION)=These settings have effect on the areas outside the component area (so in Modules and the rest of the website).
ENABLE OTHER AREAS=Enable other areas
ENABLE OTHER AREAS (DESCRIPTION)=Select whether to enable the use of the syntax in all remaining areas, like the modules and the document head.

