JNAVIGATION DESCRIPTION=<span style="font-size: 16px;"><span style="font-weight:bold;color: #d40807;">J</span><span style="font-weight:bold;">Navigation 1.4.0</span> [24/02/2010]</span><p>Plugin JNavigation is a modification of the Page Navigation plugin. It replaces the standard page navigation <strong>&lt;Prev</strong> <strong>Next&gt;</strong> for navigation buttons aligned to the top, bottom, right, center or left of the text.<br />In order to use it, you need to disable the Page Navigation Plugin in the Plugin Manager.</p><strong>ChangeLog:</strong><br /><strong>1.1.0</strong><ul><li>Added Navigation Styling selection.</li><li>Added Russian and Spanish languages in back-end.</li></ul><strong>1.2.0</strong><ul><li>Added Horizontal Alignment by Alain Bastard.</li></ul><strong>1.3.0</strong><ul><li>Added German language and some minor adaptions by Bernhard Lücke.</li></ul><strong>1.4.0</strong><ul><li>Added 3 style buttons (Corbis, Firefox and Puma) and fixed a little bug.</li></ul><p>Special thanks to <a href="http://blog.pbelkov.com/" target="_blank" title="">beliyadm</a></p>
POSITION=Position
VERTICAL ALIGNMENT OF JNAVIGATION IN RELATION TO THE TEXT=Vertical alignment of JNavigation in relation to the text.
