JOTCACHE_PLG_DESC=Advanced page caching for Joomla 1.5 web sites. JotCache Management functions covers accompanying JotCache component.<br/>General Help to Plugins is accessible on top toolbar. Here you have link for : <p><a href="http://www.kanich.net/radio/site/component/content/article/92" target="_blank" >specific Help to this plugin (and JotCache general)</a></p>
JOTCACHE_BROWSER_LBL=Use browser caching
JOTCACHE_BROWSER_DESC=If yes, use mechanism for storing page cache in the browser
JOTCACHE_LIFE_LBL=Cache Lifetime
JOTCACHE_LIFE_DESC=Page cache lifetime in minutes
JOTCACHE_CMP_LBL=Compress Cached Content
JOTCACHE_CMP_DESC=If yes, page cache performs content compression before saving in the cache
JOTCACHE_MARK_LBL=Mark Caching
JOTCACHE_MARK_DESC=(For current administrator only!)<br/>If yes, it is possible to SET MARK in JotCache component for marking cookie, which is stored in your internet browser. The cookie then allows easy check of page cache operation during front-end activity.
