SOURCERER ...PLACE ANY CODE IN JOOMLA!=Sourcerer ...place any code in Joomla!

WITH THE SOURCERER EDITOR BUTTON YOU CAN EASILY PLACE THE SOURCERER SYNTAX TAGS INTO YOUR TEXT=With the Sourcerer editor button you can easily place your code (with Sourcerer tags and styling) into your text.

INSERT CODE=Insert Code

BUTTON TEXT=Button Text
BUTTON TEXT (DESCRIPTION)=This text will be shown in the Sourcerer Editor Button.
SHOW ICON=Show Button Icon
SHOW ICON (DESCRIPTION)=If selected, the Sourcerer icon will be displayed in the Editor Button.

ENABLE IN FRONTEND=Enable in frontend
ENABLE IN FRONTEND (DESCRIPTION)=If enabled, the button will also be available in the frontend.

DEFAULTS=Defaults
DEFAULTS (DESCRIPTION)=These setting have effect on the initial settings when you open the Sourcerer Code Helper window.

ADD {SOURCE} TAGS=Add {source} tags
ADD {SOURCE} TAGS (DESCRIPTION)=If selected, the code will be surrounded by {source} tags (if the tags are not already in the code).

USE EXAMPLE CODE=Use Example Code
USE EXAMPLE CODE (DESCRIPTION)=If enabled, the example code below will be placed inside the Sourcerer tags.
ONLY IN ADMINISTRATOR=Only in Administrator
EXAMPLE CODE=Example Code
EXAMPLE CODE (DESCRIPTION)=Here you can place the example code you want to be placed inside the Sourcerer tags. If you leave this field empty and save it, this field will be reset to the default example code.

SOURCERER CODE HELPER=Sourcerer Code Helper
TEXTAREA (DESCRIPTION)=
SEE THE PLUGIN FOR SETTINGS=You can control the default settings in the plugin

TOGGLE {SOURCE} TAGS=Toggle {source} tags
TOGGLE {SOURCE} TAGS (DESCRIPTION)=You can quickly surround your code with the {source} tags, or remove them.
TOGGLE TAG STYLE=Toggle tag style
TOGGLE TAG STYLE (DESCRIPTION)=This will change the tags in your code to <b>normal</b> style (&lt;...&gt;) or <b>double bracket syntax</b> style ([[...]]).<br/><br/>The <b>double bracket syntax</b> is the safest, as some editors will strip normal style tags.

THE SOURCERER SYSTEM PLUGIN=the Sourcerer system plugin

