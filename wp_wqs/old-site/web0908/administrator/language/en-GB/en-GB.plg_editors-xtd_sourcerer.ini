#v2.1.9
PRESERVE INDENTATION=Preserve indentation
PRESERVE INDENTATION (DESCRIPTION)=Most editors will strip leading spaces and tabs in the articles. This results in your code indentation being lost once you save the article.<br /><br />With this option turned on, Sourcerer will place images in the code to keep the indentation.<br /><br />These images will not interfere with the output of the code on your website.
PRESERVE COLORS=Preserve colors
PRESERVE COLORS (DESCRIPTION)=When selected, the colors you see in the editor will also be copied to the code inserted in your content.<br /><br />These styles will not interfere with the output of the code on your website.

TOGGLE EDITOR=Toggle editor
TOGGLE EDITOR (DESCRIPTION)=Turn the editor on/off.
ARE YOU SURE?=Are you sure?